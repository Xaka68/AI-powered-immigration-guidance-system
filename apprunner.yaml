# AWS App Runner — source-based config for the FastAPI backend.
# App Runner reads this from the repo root, builds on AWS, and runs on AWS.
# In the console: Source = this GitHub repo, Branch = main, Source directory = / (root).
#
# Listens on port 8000. CORS is open (api/main.py) so the Amplify frontend can call it.
# Secrets: do NOT put LLM_API_KEY here — add it in the App Runner console
# (Configuration -> Environment variables). Without it the router uses its
# offline keyword fallback, so the app still runs.
version: 1.0
runtime: python3
build:
  commands:
    build:
      - pip install -r backend/requirements.txt
run:
  runtime-version: 3.11
  command: uvicorn api.main:app --app-dir backend/src --host 0.0.0.0 --port 8000
  network:
    port: 8000
  env:
    - name: PYTHONUNBUFFERED
      value: "1"
    - name: LLM_BASE_URL
      value: https://api.openai.com/v1
    - name: LLM_MODEL
      value: gpt-4o-mini
    - name: EMBED_MODEL
      value: intfloat/multilingual-e5-large
    - name: INTEGREAT_REGION
      value: testumgebung-frag-integreat
