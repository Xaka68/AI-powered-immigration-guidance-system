name: Build & push images to ECR

# Builds both Docker images in GitHub's cloud (no local Docker needed) and pushes
# them to Amazon ECR. App Runner, configured to auto-deploy on a new image, then
# redeploys. See DEPLOY.md for the one-time AWS setup (ECR repos, IAM creds,
# App Runner services).

on:
  push:
    branches: [main]
  workflow_dispatch: {} # lets you re-run manually after setting VITE_API_URL

permissions:
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'eu-central-1' }}
  BACKEND_REPO: compass-backend
  FRONTEND_REPO: compass-frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repositories exist
        run: |
          for repo in "$BACKEND_REPO" "$FRONTEND_REPO"; do
            aws ecr describe-repositories --repository-names "$repo" >/dev/null 2>&1 \
              || aws ecr create-repository --repository-name "$repo" >/dev/null
          done

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ env.BACKEND_REPO }}:latest
            ${{ steps.ecr.outputs.registry }}/${{ env.BACKEND_REPO }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: frontend/Dockerfile
          push: true
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ env.FRONTEND_REPO }}:latest
            ${{ steps.ecr.outputs.registry }}/${{ env.FRONTEND_REPO }}:${{ github.sha }}
          build-args: |
            VITE_API_URL=${{ vars.VITE_API_URL }}
            VITE_USE_MOCK=${{ vars.VITE_API_URL && 'false' || 'true' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to EC2 via SSM
        run: |
          INSTANCE_ID="${{ vars.EC2_INSTANCE_ID || 'i-07e903bf03e6ad1f1' }}"
          REGISTRY="${{ steps.ecr.outputs.registry }}"

          # Deploy backend
          CMD_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=[
              \"aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${REGISTRY}\",
              \"docker pull ${REGISTRY}/${BACKEND_REPO}:latest\",
              \"docker stop compass-backend 2>/dev/null; docker rm compass-backend 2>/dev/null; true\",
              \"docker run -d --name compass-backend -p 8000:8000 -e LLM_API_KEY=${{ secrets.LLM_API_KEY }} -e LLM_BASE_URL=https://api.openai.com/v1 -e LLM_MODEL=gpt-4o-mini -e APP_ROOT=/app --restart unless-stopped ${REGISTRY}/${BACKEND_REPO}:latest\",
              \"docker pull ${REGISTRY}/${FRONTEND_REPO}:latest\",
              \"docker stop compass-frontend 2>/dev/null; docker rm compass-frontend 2>/dev/null; true\",
              \"docker run -d --name compass-frontend -p 3000:3000 --restart unless-stopped ${REGISTRY}/${FRONTEND_REPO}:latest\",
              \"sleep 5\",
              \"curl -s http://localhost:8000/health\"
            ]" \
            --timeout-seconds 300 \
            --query "Command.CommandId" --output text)

          echo "SSM Command ID: $CMD_ID"
          echo "Waiting for deployment..."
          aws ssm wait command-executed --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" || true
          aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" \
            --query "{Status:Status,Output:StandardOutputContent}" --output table
